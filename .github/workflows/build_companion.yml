name: Build Companion Tweak (.deb)

on:
  push:
    branches: [main]
    paths:
      - 'VcamCompanion/**'
      - '.github/workflows/build_companion.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Compile dylib
        run: |
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -miphoneos-version-min=16.0 \
            -install_name /var/jb/Library/MobileSubstrate/DynamicLibraries/VcamCompanion.dylib \
            -o VcamCompanion.dylib \
            VcamCompanion/Tweak.m

      - name: Install dpkg
        run: brew install dpkg

      - name: Package .deb
        run: |
          DEB_ROOT=deb_build
          DYLIB_DIR=$DEB_ROOT/var/jb/Library/MobileSubstrate/DynamicLibraries
          mkdir -p $DYLIB_DIR
          mkdir -p $DEB_ROOT/DEBIAN

          cp VcamCompanion.dylib $DYLIB_DIR/
          cp VcamCompanion/VcamCompanion.plist $DYLIB_DIR/
          cp VcamCompanion/control $DEB_ROOT/DEBIAN/control

          dpkg-deb -b $DEB_ROOT VcamCompanion.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VcamCompanion-deb
          path: VcamCompanion.deb

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: VcamCompanion.deb
