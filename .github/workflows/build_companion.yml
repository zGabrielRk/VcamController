name: Build Companion Tweak (.deb)

on:
  push:
    branches: [main]
    paths:
      - 'VcamCompanion/**'
      - '.github/workflows/build_companion.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      THEOS: /opt/theos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

          # Clonar SDKs direto do repo (contém os .sdk)
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/*.sdk $THEOS/sdks/

      - name: Build .deb
        run: make package FINALPACKAGE=1
        working-directory: VcamCompanion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VcamCompanion-deb
          path: VcamCompanion/packages/*.deb

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: VcamCompanion/packages/*.deb
