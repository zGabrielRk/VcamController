name: Build Companion Tweak (.deb)

on:
  push:
    branches: [main]
    paths:
      - 'VcamCompanion/**'
      - '.github/workflows/build_companion.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV

          git clone --recursive https://github.com/theos/theos.git $THEOS

          # Baixar SDK do iOS 16.5
          curl -fsSL https://github.com/theos/sdks/releases/download/2024-10-04/iPhoneOS16.5.sdk.tar.xz \
            -o /tmp/sdk.tar.xz
          tar xf /tmp/sdk.tar.xz -C $THEOS/sdks/

      - name: Build .deb
        run: make package FINALPACKAGE=1
        working-directory: VcamCompanion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VcamCompanion-deb
          path: VcamCompanion/packages/*.deb

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: VcamCompanion/packages/*.deb
