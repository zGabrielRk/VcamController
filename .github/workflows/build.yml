name: Build VcamController IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (unsigned / TrollStore)
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar projeto Xcode
        run: python3 generate_xcodeproj.py

      - name: Compilar app
        run: |
          xcodebuild \
            -project VcamController.xcodeproj \
            -scheme VcamController \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Localizar .app
        id: find_app
        run: |
          APP=$(find build -name "VcamController.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Erro: VcamController.app não encontrado!"
            find build -name "*.app" -type d
            exit 1
          fi
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          echo "Encontrado: $APP"

      - name: Fake-sign com ldid
        run: |
          brew install ldid
          ldid -SVcamController/VcamController.entitlements "$APP_PATH/VcamController"

      - name: Empacotar IPA
        run: |
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/VcamController.app
          zip -r VcamController.ipa Payload
          rm -rf Payload
          echo "IPA: $(du -sh VcamController.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VcamController-IPA
          path: VcamController.ipa
          retention-days: 30

      - name: Criar Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "VCam Controller v1.0.${{ github.run_number }}"
          body: |
            ## VCam Rootless Controller

            Instale via **TrollStore** — arraste o `.ipa` para o TrollStore.

            ### Como usar:
            1. Abra o app
            2. Tap **Select** → escolha o vídeo
            3. Tap **Preview** para visualizar
            4. Tap **Apply** para ativar
            5. **Settings** → espelho / desativar
          files: VcamController.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
