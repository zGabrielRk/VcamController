name: Build VCam Rootless (.deb)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── 1. Build SwiftUI app ─────────────────────────────────────────────
      - name: Generate Xcode project
        run: python3 generate_xcodeproj.py

      - name: Build app (no signing)
        run: |
          xcodebuild \
            -project VcamController.xcodeproj \
            -scheme VcamController \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      # ── 2. Compile VcamTweak dylib ───────────────────────────────────────
      - name: Show Xcode and SDK version
        run: |
          xcodebuild -version
          xcrun -sdk iphoneos --show-sdk-version

      - name: Syntax-check VcamTweak.m
        run: |
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -target arm64-apple-ios16.0 \
            -fsyntax-only \
            -fobjc-arc \
            -Wno-deprecated-declarations \
            -framework Foundation \
            -framework AVFoundation \
            -framework CoreMedia \
            -framework CoreVideo \
            -framework CoreImage \
            -framework UIKit \
            VcamTweak/VcamTweak.m \
            VcamTweak/fishhook.c 2>&1 || true

      - name: Compile VcamTweak dylib
        run: |
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -target arm64-apple-ios16.0 \
            -dynamiclib \
            -fobjc-arc \
            -Wno-deprecated-declarations \
            -Wl,-undefined,dynamic_lookup \
            -framework Foundation \
            -framework AVFoundation \
            -framework CoreMedia \
            -framework CoreVideo \
            -framework CoreImage \
            -framework UIKit \
            -install_name /var/jb/Library/MobileSubstrate/DynamicLibraries/VcamTweak.dylib \
            -o VcamTweak.dylib \
            VcamTweak/VcamTweak.m \
            VcamTweak/fishhook.c

      # ── 3. Assemble .deb package ─────────────────────────────────────────
      - name: Install dpkg
        run: brew install dpkg || true

      - name: Assemble .deb structure
        run: |
          APP=$(find build -name "VcamController.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: VcamController.app not found"; exit 1
          fi

          DEB=deb_root

          # App → /var/jb/Applications/
          mkdir -p $DEB/var/jb/Applications
          cp -r "$APP" $DEB/var/jb/Applications/VcamController.app

          # Tweak dylib + plist → /var/jb/Library/MobileSubstrate/DynamicLibraries/
          mkdir -p $DEB/var/jb/Library/MobileSubstrate/DynamicLibraries
          cp VcamTweak.dylib $DEB/var/jb/Library/MobileSubstrate/DynamicLibraries/VcamTweak.dylib
          cp VcamTweak/VcamTweak.plist $DEB/var/jb/Library/MobileSubstrate/DynamicLibraries/VcamTweak.plist

          # DEBIAN metadata
          cp -r packaging/DEBIAN $DEB/DEBIAN
          chmod 755 $DEB/DEBIAN/postinst

          dpkg-deb -b $DEB VcamRootless.deb
          echo "Package size: $(du -sh VcamRootless.deb)"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VcamRootless-deb
          path: VcamRootless.deb
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "VCam Rootless v1.0.${{ github.run_number }}"
          body: |
            ## VCam Rootless — Pacote unificado

            Instale via **Sileo / Zebra / Filza** (não precisa de TrollStore).

            ### Contém:
            - **VcamTweak.dylib** — substitui frames da câmera em qualquer app
            - **VcamController.app** — interface para selecionar vídeo

            ### Como usar:
            1. Instale o `.deb`
            2. O app **VCam** aparece na tela inicial
            3. Abra, selecione o vídeo
            4. Abra Camera / FaceTime / qualquer app com câmera
          files: VcamRootless.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
