name: VcamController
options:
  bundleIdPrefix: com.vcam
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Release
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: "NO"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    STRIP_SWIFT_SYMBOLS: "NO"

targets:
  VcamController:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VcamController
        excludes:
          - Info.plist
          - VcamController.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vcam.controller
        PRODUCT_NAME: VcamController
        INFOPLIST_FILE: VcamController/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: VcamController/VcamController.entitlements
